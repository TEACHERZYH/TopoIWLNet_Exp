seed: 42

dataset:
  root: /data/zyh/projects/TopoIWLNet_Exp/data/GF6_TCUNet/processed/topoiwl_format
  train_split: /data/zyh/projects/TopoIWLNet_Exp/data/GF6_TCUNet/processed/topoiwl_format/splits/train.csv
  val_split: /data/zyh/projects/TopoIWLNet_Exp/data/GF6_TCUNet/processed/topoiwl_format/splits/val.csv
  test_split: /data/zyh/projects/TopoIWLNet_Exp/data/GF6_TCUNet/processed/topoiwl_format/splits/test.csv
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

model:
  in_channels: 3
  width: 128
  encoder: pvt_v2_b2
  pretrained: true
  freeze_encoder: false
  highres_refine: true

loss:
  lambda_boundary: 1.2
  lambda_distance: 0.5
  lambda_topology: 0.2
  lambda_pyramid: 0.15
  pyramid_scales: [2, 4, 8]
  boundary_pos_weight: 8.0
  topology_buffer_iters: 2

train:
  use_cuda: true
  epochs: 120
  batch_size: 4
  num_workers: 4
  lr: 0.00025
  weight_decay: 0.0001
  amp: true
  amp_init_scale: 1024

eval:
  mask_threshold: 0.5
  boundary_threshold: 0.5
  boundary_tolerances: [1, 2, 3, 5]
  main_tolerance: 3

output:
  exp_dir: /data/zyh/projects/TopoIWLNet_Exp/experiments/remote_gf6_pvtv2_b2_sota120
