seed: 42

dataset:
  root: F:/2026/Remote Sensing_codex/TopoIWLNet_Exp/outputs/smoke_dataset
  train_split: F:/2026/Remote Sensing_codex/TopoIWLNet_Exp/outputs/smoke_dataset/splits/train.csv
  val_split: F:/2026/Remote Sensing_codex/TopoIWLNet_Exp/outputs/smoke_dataset/splits/val.csv
  test_split: F:/2026/Remote Sensing_codex/TopoIWLNet_Exp/outputs/smoke_dataset/splits/test.csv

model:
  in_channels: 3
  width: 16
  encoder: lightweight
  pretrained: false
  pretrained_weights:
  freeze_encoder: false

loss:
  lambda_boundary: 1.0
  lambda_distance: 0.5
  lambda_topology: 0.2
  boundary_pos_weight: 6.0
  topology_buffer_iters: 2

train:
  use_cuda: false
  epochs: 1
  batch_size: 2
  num_workers: 0
  lr: 0.001
  weight_decay: 0.0001

eval:
  mask_threshold: 0.5
  boundary_threshold: 0.5
  boundary_tolerances: [1, 2, 3, 5]
  main_tolerance: 3

output:
  exp_dir: F:/2026/Remote Sensing_codex/TopoIWLNet_Exp/experiments/smoke
