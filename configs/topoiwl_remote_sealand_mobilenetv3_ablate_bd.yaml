seed: 42

dataset:
  root: /data/zyh/datasets/SeaLand_Coastline_2025/processed/topoiwl_format
  train_split: /data/zyh/datasets/SeaLand_Coastline_2025/processed/topoiwl_format/splits/train.csv
  val_split: /data/zyh/datasets/SeaLand_Coastline_2025/processed/topoiwl_format/splits/val.csv
  test_split: /data/zyh/datasets/SeaLand_Coastline_2025/processed/topoiwl_format/splits/test.csv
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]

model:
  in_channels: 3
  width: 64
  encoder: mobilenet_v3_large
  pretrained: true
  pretrained_weights: DEFAULT
  freeze_encoder: false

loss:
  lambda_boundary: 1.0
  lambda_distance: 0.5
  lambda_topology: 0.0
  boundary_pos_weight: 8.0
  topology_buffer_iters: 2

train:
  use_cuda: true
  epochs: 80
  batch_size: 8
  num_workers: 4
  lr: 0.0005
  weight_decay: 0.0001
  amp: true
  amp_init_scale: 1024

eval:
  mask_threshold: 0.5
  boundary_threshold: 0.5
  boundary_tolerances: [1, 2, 3, 5]
  main_tolerance: 3

output:
  exp_dir: /data/zyh/projects/TopoIWLNet_Exp/experiments/remote_sealand_mobilenetv3_ablate_bd
